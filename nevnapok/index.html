<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Névnapkereső</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
            margin: 40px;
            font-size: 18px;
        }

        .doboz{
            background-color: white;
            padding: 30px;
            border-radius: 10px;
        }

        .tartalom{
            display: flex;
            gap: 20px;
        }

        .kereso{
            flex: 1;
            border: 1px solid gray;
            padding: 20px;
            border-radius: 10px;
        }

        .eredmeny{
            flex: 1;
            border: 1px solid gray;
            padding: 20px;
            border-radius: 10px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            font-size: 18px;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 18px;
            cursor: pointer;
        }

        @media screen and (max-width:700px){

            body{
                margin: 10px;
                font-size: 16px;
            }

            .tartalom{
                flex-direction: column;
            }

        }

    </style>

</head>
<body>

<div class="doboz">

    <h1>Névnapkereső</h1>

    <div class="tartalom">

        <div class="kereso">

            <h2>Keresés</h2>

            <label>Dátum:</label>

            <input type="text" id="nap" placeholder="példa: 3-12">

            <button onclick="keresesNapra()">
                Keresés dátum alapján
            </button>

            <label>Név:</label>

            <input type="text" id="nev" placeholder="példa: Katalin">

            <button onclick="keresesNevre()">
                Keresés név alapján
            </button>

        </div>

        <div class="eredmeny">

            <h2>Eredmény</h2>

            <p id="talalat">
                Itt jelenik meg a találat.
            </p>

        </div>

    </div>

</div>

<script>

function keresesNapra(){

    let nap = document.getElementById("nap").value;

    let talalat = document.getElementById("talalat");

    if(nap == ""){
        talalat.innerHTML = "Adj meg egy dátumot!";
        return;
    }

    fetch("http://localhost/nevnapok/api/?nap=" + nap)

    .then(valasz => valasz.json())

    .then(adat => {

        if(adat.hiba){

            talalat.innerHTML = "Nincs találat!";

        }
        else{

            let szoveg = "";

            szoveg += "Dátum: " + adat.datum + "<br>";

            szoveg += "Névnap: " + adat.nevnap1;

            if(adat.nevnap2 != ""){
                szoveg += ", " + adat.nevnap2;
            }

            talalat.innerHTML = szoveg;

        }

    });

}

function keresesNevre(){

    let nev = document.getElementById("nev").value;

    let talalat = document.getElementById("talalat");

    if(nev == ""){
        talalat.innerHTML = "Adj meg egy nevet!";
        return;
    }

    fetch("http://localhost/nevnapok/api/?nev=" + nev)

    .then(valasz => valasz.json())

    .then(adat => {

        if(adat.hiba){

            talalat.innerHTML = "Nincs találat!";

        }
        else{

            talalat.innerHTML =
            nev + " névnapja: " + adat.datum;

        }

    });

}

</script>

</body>
</html>
